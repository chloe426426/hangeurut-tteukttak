<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>한그릇 뚝딱</title>
<meta name="description" content="강원과학고등학교 급식실의 현재 혼잡도를 알려주는 알리미입니다." />
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<meta name="theme-color" content="#1B2A41">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />

<style>
  :root{
    --peach-1:#FFC98A; --peach-2:#FF8A5C;
    --navy:#1B2A41; --navy-soft:#33465f;
    --sky:#8FCBEA; --sky-deep:#5FA9CF;
    --cream:#F7EFE0; --ink:#14181F;
    --gold:#E8B24D;
    --ok:#2E9E6B; --ok-bg:#E4F5EC;
    --mid:#DB9A2C; --mid-bg:#FBF0DA;
    --busy:#D65B4A; --busy-bg:#FBE7E2;
    --card:#FFFFFF; --line:#EFE6D8; --muted:#8A7F6E;
    --radius-lg:28px; --radius-md:18px; --radius-sm:12px;
    --font:"Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--font); color:var(--ink); background:var(--cream);
    -webkit-font-smoothing:antialiased; min-height:100vh;
    overflow-x:hidden;
  }
  .wrap{max-width:520px;margin:0 auto;padding:0 18px 56px;}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}
  button{font-family:inherit;}
  @media (prefers-reduced-motion: reduce){ *{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;} }

  header{
    position:sticky; top:0; z-index:40;
    background:rgba(247,239,224,.86); backdrop-filter:blur(10px) saturate(160%);
    border-bottom:1px solid var(--line);
  }
  .nav{display:flex;align-items:center;justify-content:space-between;height:64px;max-width:520px;margin:0 auto;padding:0 18px;}
  .brand{display:flex;align-items:center;gap:9px;}
  .brand svg{width:34px;height:34px;flex:none;}
  .brand .word{font-weight:800;font-size:17px;letter-spacing:-.01em;color:var(--navy);}
  .menu-btn{
    display:flex;align-items:center;gap:6px; padding:9px 15px; border-radius:999px;
    border:1.5px solid var(--navy); background:transparent; color:var(--navy);
    font-size:13.5px; font-weight:700; cursor:pointer; transition:background .15s ease, color .15s ease;
  }
  .menu-btn:hover{background:var(--navy);color:#fff;}
  .menu-btn svg{width:15px;height:15px;transition:transform .25s ease;}
  .menu-btn.open svg{transform:rotate(180deg);}

  .stage{
    margin-top:22px; border-radius:var(--radius-lg); padding:30px 26px 26px;
    background:linear-gradient(155deg,var(--peach-1),var(--peach-2));
    position:relative; overflow:hidden; color:var(--navy);
    box-shadow:0 18px 40px -18px rgba(214,110,60,.55);
  }
  .stage::before{
    content:""; position:absolute; width:340px; height:340px; border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.30), transparent 60%);
    top:-120px; right:-90px; pointer-events:none;
  }
  .eyebrow{
    display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:700;
    letter-spacing:.03em; color:rgba(27,42,65,.72);
  }
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--navy-soft);flex:none;}
  .eyebrow .dot.live{background:var(--ok);animation:blip 1.8s ease-out infinite;}
  @keyframes blip{0%{box-shadow:0 0 0 0 rgba(46,158,107,.55);}70%{box-shadow:0 0 0 8px rgba(46,158,107,0);}100%{box-shadow:0 0 0 0 rgba(46,158,107,0);}}

  .stage-body{display:flex;align-items:center;gap:16px;margin-top:14px;position:relative;z-index:1;}
  .mascot-hero{width:104px;height:104px;flex:none;filter:drop-shadow(0 10px 14px rgba(27,42,65,.22));}
  .stage-text{min-width:0;}
  .status-word{font-size:50px;line-height:1;font-weight:900;letter-spacing:-.03em;}
  .status-reco{margin-top:6px;font-size:15px;font-weight:600;color:rgba(27,42,65,.78);}

  .stage-foot{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    margin-top:22px;padding-top:16px;border-top:1px solid rgba(27,42,65,.14);
    position:relative;z-index:1;
  }
  .stage-foot .updated{font-size:12.5px;font-weight:600;color:rgba(27,42,65,.65);}
  .detail-btn{
    display:inline-flex;align-items:center;gap:6px;padding:10px 16px;border-radius:999px;
    background:var(--navy);color:#fff;border:none;font-size:13.5px;font-weight:700;cursor:pointer;
    transition:transform .12s ease, opacity .15s ease;
  }
  .detail-btn:active{transform:scale(.97);}
  .detail-btn svg{width:14px;height:14px;transition:transform .25s ease;}
  .detail-btn.open svg{transform:rotate(180deg);}

  .detail-panel{
    max-height:0; overflow:hidden; transition:max-height .38s cubic-bezier(.2,.8,.2,1);
  }
  .detail-panel.open{max-height:420px;}
  .detail-inner{margin-top:14px;border-radius:var(--radius-md);background:var(--card);border:1px solid var(--line);padding:16px;}
  .detail-inner .cam-head{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:10px;}
  .cam-frame{
    position:relative; width:100%; aspect-ratio:4/3; border-radius:var(--radius-sm);
    background:var(--navy); overflow:hidden;
  }
  .cam-frame img{width:100%;height:100%;object-fit:cover;display:block;}
  .cam-loading{
    position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; color:#cfe3f2; font-size:12.5px; font-weight:600;
  }
  .cam-loading svg{width:40px;height:40px;animation:spin-swim 1.3s ease-in-out infinite;}
  @keyframes spin-swim{0%{transform:rotate(0deg) scale(1);}50%{transform:rotate(180deg) scale(1.05);}100%{transform:rotate(360deg) scale(1);}}
  .grid3{display:flex;gap:10px;margin-top:12px;}
  .stat-chip{flex:1;background:var(--cream);border:1px solid var(--line);border-radius:var(--radius-sm);padding:10px 12px;}
  .stat-chip .k{font-size:11px;color:var(--muted);font-weight:600;}
  .stat-chip .v{font-size:17px;font-weight:800;color:var(--navy);margin-top:2px;}

  .menu-panel{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.2,.8,.2,1);}
  .menu-panel.open{max-height:900px;}
  .menu-card{margin-top:16px;border-radius:var(--radius-lg);background:var(--card);border:1px solid var(--line);padding:20px;}
  .menu-card .head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
  .menu-card .head h2{font-size:18px;font-weight:800;margin:0;color:var(--navy);}
  .menu-card .head .date{font-size:12.5px;color:var(--muted);font-weight:600;}
  .tabs{display:flex;gap:6px;background:var(--cream);padding:4px;border-radius:999px;margin-bottom:14px;}
  .tab{flex:1;text-align:center;padding:8px 0;border-radius:999px;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;transition:background .15s ease,color .15s ease;}
  .tab.active{background:var(--navy);color:#fff;}
  .meal-list{list-style:none;margin:0;padding:0;}
  .meal-list li{padding:9px 2px;border-top:1px dashed var(--line);font-size:14.5px;color:var(--ink);}
  .meal-list li:first-child{border-top:0;}
  .meal-list li.empty{color:var(--muted);}
  .allergy{margin-top:14px;font-size:11.5px;color:var(--muted);line-height:1.65;}

  .corner-mascot{
    position:fixed; right:16px; bottom:18px; width:56px;height:56px; z-index:30;
    filter:drop-shadow(0 8px 14px rgba(27,42,65,.28)); cursor:default;
    animation:corner-sway 3.2s ease-in-out infinite;
    transform-origin:70% 85%;
  }
  @keyframes corner-sway{
    0%,100%{transform:rotate(-4deg) translateY(0);}
    50%{transform:rotate(5deg) translateY(-4px);}
  }

  #loading{
    position:fixed; inset:0; z-index:100; background:linear-gradient(155deg,var(--peach-1),var(--peach-2));
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px;
    transition:opacity .45s ease, visibility .45s ease;
  }
  #loading.hide{opacity:0;visibility:hidden;pointer-events:none;}
  #loading svg{width:88px;height:88px;animation:spin-swim 1.2s ease-in-out infinite;}
  #loading .txt{font-size:13.5px;font-weight:700;color:var(--navy);letter-spacing:.02em;}
</style>
</head>
<body>

<div id="loading">
  <svg viewBox="0 0 120 120"><use href="#ray-idle"/></svg>
  <div class="txt">가오리가 줄을 세어보는 중…</div>
</div>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <symbol id="ray-idle" viewBox="0 0 120 120">
      <path d="M60 10 C95 22 108 55 96 84 C90 98 74 108 60 112 C46 108 30 98 24 84 C12 55 25 22 60 10 Z" fill="#8FCBEA" stroke="#1B2A41" stroke-width="4"/>
      <path d="M60 108 C58 118 64 128 74 132 C68 122 68 114 66 108 Z" fill="#5FA9CF" stroke="#1B2A41" stroke-width="3.5" stroke-linejoin="round"/>
      <circle cx="46" cy="56" r="9" fill="#fff" stroke="#1B2A41" stroke-width="3.5"/>
      <circle cx="74" cy="56" r="9" fill="#fff" stroke="#1B2A41" stroke-width="3.5"/>
      <circle cx="47.5" cy="57.5" r="3.6" fill="#1B2A41"/>
      <circle cx="75.5" cy="57.5" r="3.6" fill="#1B2A41"/>
      <path d="M52 74 Q60 79 68 74" stroke="#1B2A41" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    </symbol>
    <symbol id="ray-calm" viewBox="0 0 120 120">
      <path d="M60 10 C95 22 108 55 96 84 C90 98 74 108 60 112 C46 108 30 98 24 84 C12 55 25 22 60 10 Z" fill="#8FCBEA" stroke="#1B2A41" stroke-width="4"/>
      <path d="M60 108 C58 118 64 128 74 132 C68 122 68 114 66 108 Z" fill="#5FA9CF" stroke="#1B2A41" stroke-width="3.5" stroke-linejoin="round"/>
      <path d="M39 53 Q46 46 53 53" stroke="#1B2A41" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M67 53 Q74 46 81 53" stroke="#1B2A41" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M48 73 Q60 84 72 73" stroke="#1B2A41" stroke-width="4" fill="none" stroke-linecap="round"/>
      <circle cx="33" cy="66" r="6" fill="#FF9C87" opacity=".65"/>
      <circle cx="87" cy="66" r="6" fill="#FF9C87" opacity=".65"/>
    </symbol>
    <symbol id="ray-mid" viewBox="0 0 120 120">
      <path d="M60 10 C95 22 108 55 96 84 C90 98 74 108 60 112 C46 108 30 98 24 84 C12 55 25 22 60 10 Z" fill="#8FCBEA" stroke="#1B2A41" stroke-width="4"/>
      <path d="M60 108 C58 118 64 128 74 132 C68 122 68 114 66 108 Z" fill="#5FA9CF" stroke="#1B2A41" stroke-width="3.5" stroke-linejoin="round"/>
      <circle cx="46" cy="57" r="8.5" fill="#fff" stroke="#1B2A41" stroke-width="3.5"/>
      <circle cx="74" cy="57" r="8.5" fill="#fff" stroke="#1B2A41" stroke-width="3.5"/>
      <circle cx="46" cy="59.5" r="3.4" fill="#1B2A41"/>
      <circle cx="74" cy="59.5" r="3.4" fill="#1B2A41"/>
      <path d="M52 77 L68 77" stroke="#1B2A41" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    </symbol>
    <symbol id="ray-busy" viewBox="0 0 120 120">
      <path d="M60 10 C95 22 108 55 96 84 C90 98 74 108 60 112 C46 108 30 98 24 84 C12 55 25 22 60 10 Z" fill="#8FCBEA" stroke="#1B2A41" stroke-width="4"/>
      <path d="M60 108 C58 118 64 128 74 132 C68 122 68 114 66 108 Z" fill="#5FA9CF" stroke="#1B2A41" stroke-width="3.5" stroke-linejoin="round"/>
      <path d="M40 60 L52 52" stroke="#1B2A41" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M80 60 L68 52" stroke="#1B2A41" stroke-width="3.5" fill="none" stroke-linecap="round"/>
      <path d="M50 80 Q60 71 70 80" stroke="#1B2A41" stroke-width="4" fill="none" stroke-linecap="round"/>
      <path d="M84 42 C88 48 88 55 83 59" stroke="#5FA9CF" stroke-width="4" fill="none" stroke-linecap="round"/>
    </symbol>
  </defs>
</svg>

<header>
  <div class="nav">
    <div class="brand">
      <svg viewBox="0 0 120 120"><use href="#ray-idle"/></svg>
      <span class="word">한그릇 뚝딱</span>
    </div>
    <button class="menu-btn" id="menuToggleBtn" aria-expanded="false">
      급식 메뉴
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
    </button>
  </div>
</header>

<div class="wrap">

  <section class="stage">
    <span class="eyebrow"><span class="dot" id="liveDot"></span><span id="liveLabel">연결 대기중</span></span>

    <div class="stage-body">
      <svg class="mascot-hero" id="mascotHero" viewBox="0 0 120 120"><use href="#ray-idle" id="mascotUse"/></svg>
      <div class="stage-text">
        <div class="status-word" id="statusWord" style="color:var(--navy-soft)">—</div>
        <div class="status-reco" id="statusReco">데이터를 불러오는 중이에요</div>
      </div>
    </div>

    <div class="stage-foot">
      <span class="updated" id="updated">연결 중…</span>
      <button class="detail-btn" id="detailBtn" aria-expanded="false">
        자세히 보기
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
      </button>
    </div>
  </section>

  <div class="detail-panel" id="detailPanel">
    <div class="detail-inner">
      <div class="cam-head">
        <span>대기줄 실시간</span><span style="color:var(--line)">·</span><span>사람은 블러 처리됩니다</span>
      </div>
      <div class="cam-frame">
        <div class="cam-loading" id="camLoading">
          <svg viewBox="0 0 120 120"><use href="#ray-idle"/></svg>
          영상 연결 중…
        </div>
        <img id="camStream" alt="대기줄 실시간 (블러)" style="display:none" />
      </div>
      <div class="grid3">
        <div class="stat-chip"><div class="k">현재 인원</div><div class="v num" id="gaugeNum">—</div></div>
        <div class="stat-chip"><div class="k">상태</div><div class="v" id="chipStatus">—</div></div>
        <div class="stat-chip"><div class="k">업데이트</div><div class="v" id="chipUpdated" style="font-size:13px;">—</div></div>
      </div>
    </div>
  </div>

  <div class="menu-panel" id="menuPanel">
    <div class="menu-card">
      <div class="head"><h2>오늘의 급식</h2><span class="date" id="todayDate"></span></div>
      <div class="tabs">
        <div class="tab" data-meal="breakfast">아침</div>
        <div class="tab active" data-meal="lunch">점심</div>
        <div class="tab" data-meal="dinner">저녁</div>
      </div>
      <ul class="meal-list" id="mealList"></ul>
      <p class="allergy">
        알레르기 유발식품: ①난류 ②우유 ③메밀 ④땅콩 ⑤대두 ⑥밀 ⑦고등어 ⑧게 ⑨새우 ⑩돼지고기
        ⑪복숭아 ⑫토마토 ⑬아황산류 ⑭호두 ⑮닭고기 ⑯쇠고기 ⑰오징어 ⑱조개류 ⑲잣<br>
        ※ 식자재 수급 사정에 따라 메뉴가 변경될 수 있습니다.
      </p>
    </div>
  </div>

</div>

<svg class="corner-mascot" id="cornerMascot" viewBox="0 0 120 120"><use href="#ray-idle"/></svg>

<script>
const CONFIG = {
  congestionApiUrl: "/api/status",
  camStreamUrl: "/video",
  menuApiUrl: "/api/menu",
  pollIntervalSec: 15,
  staleAfterSec: 120,
  showCornerMascot: true,
  fallbackMenu: {
    date: "",
    breakfast: ["참치야채죽","매실장아찌","스크램블에그","배추김치","모듬시리얼 + 우유","사과쥬스","핑키핑키심쿵버거"],
    lunch:     ["보리비빔밥 & 약고추장","청국장찌개(선)","콩나물무침","제육볶음","다시마쌈/양배추쌈/초장","갓김치","방울토마토"],
    dinner:    ["찹쌀밥","닭개장","열무된장무침","돈까스&소스","순수한콘치즈","배추김치","오라떼"],
  },
};

const $ = (id) => document.getElementById(id);
if (!CONFIG.showCornerMascot) $("cornerMascot").style.display = "none";

const LEVELS = {
  ok:   { word:"여유", reco:"지금 가면 딱 좋아요", mascot:"#ray-calm", cls:"ok" },
  mid:  { word:"보통", reco:"조금 붐벼요",         mascot:"#ray-mid",  cls:"mid" },
  busy: { word:"혼잡", reco:"많이 붐벼요 · 잠시 후 추천", mascot:"#ray-busy", cls:"busy" },
};
function levelOf(v){ if (v<=12) return "ok"; if (v<=20) return "mid"; return "busy"; }

const state = { value:null, updatedAt:null, live:false };
let firstLoadDone = false;

function applyState(){
  const wordEl=$("statusWord"), recoEl=$("statusReco"), mUse=$("mascotUse");
  const dotEl=$("liveDot"), labelEl=$("liveLabel");
  const chipStatus=$("chipStatus"), gaugeNum=$("gaugeNum");

  if (state.value == null){
    wordEl.textContent="—"; wordEl.style.color="var(--navy-soft)";
    recoEl.textContent="데이터를 불러오는 중이에요";
    dotEl.className="dot"; labelEl.textContent="연결 대기중";
    chipStatus.textContent="—"; gaugeNum.textContent="—";
    mUse.setAttribute("href","#ray-idle");
  } else {
    const key = levelOf(state.value);
    const L = LEVELS[key];
    wordEl.textContent=L.word;
    wordEl.style.color = key==="ok" ? "var(--ok)" : key==="mid" ? "var(--mid)" : "var(--busy)";
    recoEl.textContent=L.reco;
    mUse.setAttribute("href", L.mascot);
    chipStatus.textContent=L.word;
    gaugeNum.textContent=state.value+"명";
    dotEl.className = "dot" + (state.live ? " live" : "");
    labelEl.textContent = state.live ? "실시간" : "예시 데이터";
  }
  updateRelative();
}

function updateRelative(){
  const el=$("updated"), chip=$("chipUpdated");
  if (state.value==null){ el.textContent="연결 중…"; chip.textContent="—"; return; }
  if (!state.live){ el.textContent="예시 데이터"; chip.textContent="예시"; return; }
  const sec = Math.max(0, Math.round((Date.now()-state.updatedAt.getTime())/1000));
  const txt = sec<5?"방금 전":sec<60?`${sec}초 전`:`${Math.floor(sec/60)}분 전`;
  el.textContent = "업데이트 " + txt + (sec>CONFIG.staleAfterSec ? " · 지연 중" : "");
  chip.textContent = txt;
}

async function pollCongestion(){
  try{
    const r = await fetch(CONFIG.congestionApiUrl, {cache:"no-store"});
    if (!r.ok) throw new Error("HTTP "+r.status);
    const d = await r.json();
    if (typeof d.count !== "number") throw new Error("no count");
    state.value = d.count;
    state.updatedAt = d.updatedAt ? new Date(d.updatedAt) : new Date();
    state.live = true;
    applyState();
  }catch(e){
    console.warn("[혼잡도] 실패:", e.message);
    updateRelative();
  }finally{
    if (!firstLoadDone){ firstLoadDone = true; $("loading").classList.add("hide"); }
  }
}

let menuData = CONFIG.fallbackMenu;

function renderMeal(key){
  const list = $("mealList");
  const items = (menuData && menuData[key]) || [];
  list.innerHTML = "";
  if (items.length===0){
    list.innerHTML = '<li class="empty">메뉴 정보 없음</li>';
    return;
  }
  for (const name of items){
    const li = document.createElement("li");
    li.textContent = name;
    list.appendChild(li);
  }
}

function activeMealKey(){
  return document.querySelector(".tab.active")?.dataset.meal || "lunch";
}

document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click", ()=>{
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    tab.classList.add("active");
    renderMeal(tab.dataset.meal);
  });
});

async function loadMenu(){
  if (!CONFIG.menuApiUrl){
    menuData = CONFIG.fallbackMenu;
    renderMeal(activeMealKey());
    return;
  }
  try{
    const r = await fetch(CONFIG.menuApiUrl, {cache:"no-store"});
    if (!r.ok) throw new Error("HTTP "+r.status);
    const d = await r.json();
    menuData = {
      breakfast: Array.isArray(d.breakfast) ? d.breakfast : [],
      lunch: Array.isArray(d.lunch) ? d.lunch : [],
      dinner: Array.isArray(d.dinner) ? d.dinner : [],
    };
    if (d.date) $("todayDate").textContent = d.date;
    renderMeal(activeMealKey());
  }catch(e){
    console.warn("[급식] 불러오기 실패 → 예시 메뉴 사용:", e.message);
    menuData = CONFIG.fallbackMenu;
    renderMeal(activeMealKey());
  }
}

const menuBtn = $("menuToggleBtn"), menuPanel = $("menuPanel");
menuBtn.addEventListener("click", ()=>{
  const open = menuPanel.classList.toggle("open");
  menuBtn.classList.toggle("open", open);
  menuBtn.setAttribute("aria-expanded", open);
});

const detailBtn = $("detailBtn"), detailPanel = $("detailPanel");
let camStarted = false;
detailBtn.addEventListener("click", ()=>{
  const open = detailPanel.classList.toggle("open");
  detailBtn.classList.toggle("open", open);
  detailBtn.setAttribute("aria-expanded", open);
  if (open && !camStarted){
    camStarted = true;
    const img = $("camStream"), loading = $("camLoading");
    img.addEventListener("load", ()=>{ loading.style.display="none"; img.style.display="block"; });
    img.addEventListener("error", ()=>{
      loading.querySelector("svg")?.style.setProperty("display","block");
      setTimeout(()=>{ img.src = CONFIG.camStreamUrl + "?t=" + Date.now(); }, 3000);
    });
    img.src = CONFIG.camStreamUrl;
  }
});

(function init(){
  const now=new Date(); const days=["일","월","화","수","목","금","토"];
  $("todayDate").textContent = `${now.getFullYear()}. ${now.getMonth()+1}. ${now.getDate()} (${days[now.getDay()]})`;
  loadMenu();

  applyState();
  pollCongestion();
  setInterval(pollCongestion, Math.max(2, CONFIG.pollIntervalSec)*1000);
  setInterval(updateRelative, 1000);

  setTimeout(()=>{ $("loading").classList.add("hide"); }, 1500);
})();
</script>
</body>
